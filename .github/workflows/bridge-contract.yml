name: Bridge Contract

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check-bridge-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify generated bridge docs
        run: make check-bridge
